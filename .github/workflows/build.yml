name: Build & Release ValidationUtility

on:
push:
tags:
- 'v*'

jobs:
build:
runs-on: ${{ matrix.os }}

```
strategy:
  matrix:
    os: [windows-latest, macos-latest]

steps:
  - uses: actions/checkout@v4

  - name: Extract version
    shell: bash
    run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install Nuitka
    run: pip install nuitka

  # ---------------- WINDOWS ----------------
  - name: Build EXE
    if: runner.os == 'Windows'
    run: |
      python -m nuitka main.py ^
      --standalone ^
      --onefile ^
      --output-filename=ValidationUtility-%VERSION%.exe ^
      --windows-icon-from-ico=ValidationUtility.ico

  - name: Debug files (Windows)
    if: runner.os == 'Windows'
    run: dir

  - name: Install Inno Setup
    if: runner.os == 'Windows'
    run: choco install innosetup -y

  - name: Build Installer
    if: runner.os == 'Windows'
    run: ISCC.exe validation_utility_installer.iss

  - name: Upload Windows Installer
    if: runner.os == 'Windows'
    uses: actions/upload-artifact@v4
    with:
      name: windows-installer
      path: Output\ValidationUtility-Setup-%VERSION%.exe

  # ---------------- macOS ----------------
  - name: Build macOS App
    if: runner.os == 'macOS'
    run: |
      python -m nuitka main.py \
      --standalone \
      --macos-create-app-bundle

  - name: Rename macOS App
    if: runner.os == 'macOS'
    run: mv main.app ValidationUtility-${{ env.VERSION }}.app

  - name: Debug files (macOS)
    if: runner.os == 'macOS'
    run: ls

  - name: Upload macOS App
    if: runner.os == 'macOS'
    uses: actions/upload-artifact@v4
    with:
      name: macos-app
      path: ValidationUtility-${{ env.VERSION }}.app
```

release:
needs: build
runs-on: ubuntu-latest

```
steps:
  - name: Download artifacts
    uses: actions/download-artifact@v4

  - name: Create Release
    uses: softprops/action-gh-release@v2
    with:
      files: |
        windows-installer/ValidationUtility-Setup-*.exe
        macos-app/ValidationUtility-*.app
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
