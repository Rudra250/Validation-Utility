name: Build and Release

on:
push:
tags:
- 'v*'

jobs:
build-windows:
runs-on: windows-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set version
    shell: bash
    run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install Nuitka
    run: pip install nuitka

  - name: Build EXE
    run: |
      python -m nuitka main.py ^
      --standalone ^
      --onefile ^
      --output-filename=ValidationUtility-%VERSION%.exe ^
      --windows-icon-from-ico=ValidationUtility.ico

  - name: Install Inno Setup
    run: choco install innosetup -y

  - name: Build Installer
    run: ISCC.exe validation_utility_installer.iss

  - name: Upload Installer
    uses: actions/upload-artifact@v4
    with:
      name: windows-installer
      path: Output\*.exe
```

build-macos:
runs-on: macos-latest

```
steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Set version
    shell: bash
    run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Install Nuitka
    run: pip install nuitka

  - name: Build macOS App
    run: |
      python -m nuitka main.py \
      --standalone \
      --macos-create-app-bundle

  - name: Rename App
    run: mv main.app ValidationUtility-$VERSION.app

  - name: Upload macOS App
    uses: actions/upload-artifact@v4
    with:
      name: macos-app
      path: ValidationUtility-*.app
```

release:
needs: [build-windows, build-macos]
runs-on: ubuntu-latest

```
steps:
  - name: Download artifacts
    uses: actions/download-artifact@v4

  - name: Create Release
    uses: softprops/action-gh-release@v2
    with:
      files: |
        windows-installer/*.exe
        macos-app/*.app
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
